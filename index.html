<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הזמנה מיוחדת ✨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg,
        #0a1628 0%,
        #0d2444 20%,
        #1a4a7a 50%,
        #e8904a 75%,
        #f4c87a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Stars ── */
    .star {
      position: fixed;
      width: 3px; height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.4); }
    }

    /* ── Waves ── */
    .waves {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 140px;
      overflow: hidden;
    }
    .wave {
      position: absolute;
      bottom: 0; left: -50%;
      width: 200%;
      height: 140px;
      background: rgba(30,100,160,0.45);
      border-radius: 43% 57% 40% 60% / 45% 55% 35% 65%;
      animation: wave-move 6s ease-in-out infinite;
    }
    .wave:nth-child(2) {
      background: rgba(20,80,140,0.35);
      animation: wave-move 8s ease-in-out infinite reverse;
      bottom: -20px;
    }
    .wave:nth-child(3) {
      background: rgba(10,60,120,0.25);
      animation: wave-move 10s ease-in-out infinite;
      bottom: -40px;
    }
    @keyframes wave-move {
      0%,100% { transform: translateX(0) rotate(0deg); }
      50%      { transform: translateX(5%) rotate(1.5deg); }
    }

    /* ── Floating emoji ── */
    .float {
      position: fixed;
      font-size: 28px;
      animation: floatUp 8s ease-in-out infinite;
      opacity: 0.7;
      pointer-events: none;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-5deg); opacity: 0.5; }
      50%  { transform: translateY(-30px) rotate(5deg); opacity: 0.9; }
      100% { transform: translateY(0) rotate(-5deg); opacity: 0.5; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      padding: 44px 40px 40px;
      max-width: 480px;
      width: 92%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
      animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .top-emoji { font-size: 48px; margin-bottom: 16px; line-height: 1; }

    h1 {
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 28px;
      font-weight: 300;
      line-height: 1.5;
    }

    /* ── Details pills ── */
    .details {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }
    .detail {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 12px 20px;
      color: #fff;
      font-size: 16px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.3px;
    }
    .detail-icon { font-size: 22px; }

    /* ── Question ── */
    .question {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 28px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    /* ── Yes button ── */
    .yes-btn {
      display: inline-block;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #fff;
      border: none;
      border-radius: 60px;
      padding: 18px 60px;
      font-size: 22px;
      font-weight: 700;
      font-family: 'Heebo', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(17,153,142,0.5);
      transition: transform 0.18s, box-shadow 0.18s;
      letter-spacing: 0.5px;
    }
    .yes-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 12px 40px rgba(56,239,125,0.55);
    }
    .yes-btn:active { transform: scale(0.97); }

    /* ── No button (evasive) ── */
    #no-btn {
      position: fixed;
      z-index: 20;
      font-family: 'Heebo', sans-serif;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 3px 10px;
      cursor: default;
      pointer-events: auto;
      user-select: none;
      transition: left 0.18s ease, top 0.18s ease;
      white-space: nowrap;
    }

    /* ── Moon ── */
    .moon {
      position: fixed;
      top: 40px; right: 60px;
      width: 60px; height: 60px;
      background: radial-gradient(circle at 35% 40%, #fffde7, #ffe082);
      border-radius: 50%;
      box-shadow: 0 0 30px 8px rgba(255,230,100,0.4), 0 0 80px 20px rgba(255,200,50,0.15);
      animation: moonGlow 4s ease-in-out infinite alternate;
    }
    @keyframes moonGlow {
      from { box-shadow: 0 0 30px 8px rgba(255,230,100,0.4), 0 0 80px 20px rgba(255,200,50,0.15); }
      to   { box-shadow: 0 0 50px 15px rgba(255,230,100,0.6), 0 0 120px 30px rgba(255,200,50,0.25); }
    }

    /* ── Success overlay ── */
    #success {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    #success.show { display: flex; }
    .success-box {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      color: #fff;
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .success-box h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
    .success-box p  { font-size: 16px; color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>

  <!-- Moon -->
  <div class="moon"></div>

  <!-- Stars -->
  <script>
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top  = Math.random() * 55 + 'vh';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      s.style.width = s.style.height = (1 + Math.random() * 3) + 'px';
      document.body.appendChild(s);
    }
  </script>

  <!-- Floating emojis -->
  <div class="float" style="left:6%; top:25%; animation-delay:0s;">🌊</div>
  <div class="float" style="left:88%; top:18%; animation-delay:1.2s;">✈️</div>
  <div class="float" style="left:12%; top:65%; animation-delay:2.4s;">🍓</div>
  <div class="float" style="left:82%; top:60%; animation-delay:0.8s;">🍉</div>
  <div class="float" style="left:50%; top:10%; animation-delay:1.8s;">🌟</div>
  <div class="float" style="left:3%;  top:45%; animation-delay:3s;">🥭</div>
  <div class="float" style="left:92%; top:40%; animation-delay:2s;">🌴</div>

  <!-- Waves -->
  <div class="waves">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="top-emoji">🏖️🌙✨</div>

    <h1>יעל, שלום!</h1>
    <p class="subtitle">
      קיבלתי שליחות מיוחדת –<br/>
      להזמין אותך לערב שלא תשכחי
    </p>

    <div class="details">
      <div class="detail">
        <span class="detail-icon">🌙</span>
        <span>מוצאי שבת הקרוב</span>
      </div>
      <div class="detail">
        <span class="detail-icon">🏖️</span>
        <span>על שפת הים</span>
      </div>
      <div class="detail">
        <span class="detail-icon">🍓🍉🥭</span>
        <span>פירות טריים ואווירה קסומה</span>
      </div>
    </div>

    <p class="question">אז מה את אומרת? 😊</p>

    <button class="yes-btn" onclick="sayYes()">
      כן! 🥰 אשמח להגיע
    </button>
  </div>

  <!-- Evasive No button -->
  <button id="no-btn">לא</button>

  <!-- Success overlay -->
  <div id="success">
    <div class="success-box">
      <div style="font-size:56px;margin-bottom:16px;">🎉</div>
      <h2>מעולה! מעבירה אותך לווטסאפ...</h2>
      <p>נתנאל ממתין לתגובתך 💬</p>
    </div>
  </div>

  <script>
    /* ── Evasive No button ── */
    const noBtn = document.getElementById('no-btn');
    const margin = 60;

    function randomPos() {
      const x = margin + Math.random() * (window.innerWidth  - margin * 2 - noBtn.offsetWidth);
      const y = margin + Math.random() * (window.innerHeight - margin * 2 - noBtn.offsetHeight);
      noBtn.style.left = x + 'px';
      noBtn.style.top  = y + 'px';
    }

    randomPos();
    noBtn.addEventListener('mouseenter', randomPos);
    noBtn.addEventListener('touchstart', e => { e.preventDefault(); randomPos(); }, { passive: false });
    noBtn.addEventListener('click', e => { e.preventDefault(); randomPos(); });
    setInterval(randomPos, 4000);

    /* ── Yes ── */
    function sayYes() {
      document.getElementById('success').classList.add('show');
      const msg = encodeURIComponent('היי נתנאל אני ממש אשמח להיפגש איתך במוצאי שבת הקרובים');
      setTimeout(() => {
        window.location.href = 'https://wa.me/972532291952?text=' + msg;
      }, 1800);
    }
  </script>
</body>
</html>
